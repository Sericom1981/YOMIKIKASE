<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="読み聞かせ">
<meta name="theme-color" content="#ffffff">
<title>読み聞かせ記録</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --c-bg:#f5f5f5;--c-white:#fff;--c-border:#e0e0e0;
  --c-text:#1a1a1a;--c-muted:#666;--c-accent:#3b6fd4;
  --c-warn:#d4730b;--c-danger:#c0392b;--c-success:#1a7a4a;
  --c-warn-bg:#fff8f0;--c-success-bg:#f0fff6;--c-info-bg:#f0f4ff;
  --radius:12px;--radius-sm:8px;--safe-bottom:env(safe-area-inset-bottom,0px)
}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;background:var(--c-bg);color:var(--c-text);min-height:100vh;padding-bottom:calc(68px + var(--safe-bottom))}
.hidden{display:none!important}

.nav{position:fixed;bottom:0;left:0;right:0;background:var(--c-white);border-top:1px solid var(--c-border);display:flex;padding-bottom:var(--safe-bottom);z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0 8px;gap:3px;background:none;border:none;color:var(--c-muted);font-size:10px;cursor:pointer}
.nav-btn.active{color:var(--c-accent)}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8}

.header{background:var(--c-white);border-bottom:1px solid var(--c-border);padding:14px 16px;position:sticky;top:0;z-index:50}
.header h1{font-size:17px;font-weight:600}
.header p{font-size:12px;color:var(--c-muted);margin-top:2px}

.section{display:none;padding:14px 16px;max-width:600px;margin:0 auto}
.section.active{display:block}

.card{background:var(--c-white);border-radius:var(--radius);border:1px solid var(--c-border);padding:14px 16px;margin-bottom:12px}

label{display:block;font-size:12px;color:var(--c-muted);margin-bottom:5px;font-weight:500}
select,input[type=text]{width:100%;padding:10px 12px;border:1.5px solid var(--c-border);border-radius:var(--radius-sm);font-size:16px;background:var(--c-white);color:var(--c-text);-webkit-appearance:none;appearance:none}
select:focus,input:focus{outline:none;border-color:var(--c-accent)}

.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.row4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:12px}
.fg{margin-bottom:12px}

.photo-area{border:2px dashed var(--c-border);border-radius:var(--radius-sm);min-height:100px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--c-muted);font-size:13px;cursor:pointer;position:relative;overflow:hidden;background:var(--c-bg)}
.photo-area img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.photo-area input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.photo-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center}
.photo-overlay span{color:#fff;font-size:12px;background:rgba(0,0,0,0.5);padding:4px 10px;border-radius:20px}

.alert{padding:10px 12px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:10px;display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.alert svg{width:17px;height:17px;flex-shrink:0;margin-top:1px;stroke:currentColor;fill:none;stroke-width:2}
.alert.warn{background:var(--c-warn-bg);color:var(--c-warn)}
.alert.ok{background:var(--c-success-bg);color:var(--c-success)}
.alert.info{background:var(--c-info-bg);color:var(--c-accent)}

.btn{width:100%;padding:13px;border-radius:var(--radius-sm);border:none;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn:active{opacity:.75}
.btn-primary{background:var(--c-accent);color:#fff}

/* 一覧 */
.filter-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat{background:var(--c-white);border-radius:var(--radius-sm);border:1px solid var(--c-border);padding:10px 6px;text-align:center}
.stat-n{font-size:20px;font-weight:700;color:var(--c-accent)}
.stat-l{font-size:11px;color:var(--c-muted);margin-top:2px}

.book-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--c-white);border-radius:var(--radius-sm);border:1px solid var(--c-border);margin-bottom:8px}
.book-thumb{width:40px;height:52px;border-radius:5px;background:var(--c-bg);border:1px solid var(--c-border);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:18px}
.book-thumb img{width:100%;height:100%;object-fit:cover}
.book-info{flex:1;min-width:0}
.book-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.book-meta{font-size:11px;color:var(--c-muted);margin-top:3px;display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500}
.badge-grade{background:#e8f0fe;color:#3b6fd4}
.badge-klasse{background:#e8f5e9;color:#2e7d32}
.del-btn{padding:8px;background:none;border:none;cursor:pointer;color:var(--c-muted);flex-shrink:0}
.del-btn:active{color:var(--c-danger)}

/* 重複チェック */
.chk-tabs{display:flex;gap:6px;margin-bottom:14px}
.chk-tab{flex:1;padding:8px;border:1.5px solid var(--c-border);border-radius:var(--radius-sm);background:var(--c-white);font-size:13px;cursor:pointer;text-align:center;color:var(--c-muted)}
.chk-tab.active{border-color:var(--c-accent);color:var(--c-accent);font-weight:600}

.chk-section-title{font-size:12px;font-weight:600;color:var(--c-muted);padding:6px 0 4px;border-bottom:1px solid var(--c-border);margin-bottom:8px}
.klasse-block{margin-bottom:14px}
.klasse-header{font-size:13px;font-weight:600;color:var(--c-text);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.klasse-badge{background:var(--c-info-bg);color:var(--c-accent);padding:2px 10px;border-radius:20px;font-size:12px}

/* 設定 */
.setup-step{background:var(--c-white);border-radius:var(--radius);border:1px solid var(--c-border);padding:14px 16px;margin-bottom:12px}
.setup-step h3{font-size:14px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--c-accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}

.empty{text-align:center;padding:32px 16px;color:var(--c-muted);font-size:14px}
</style>
</head>
<body>

<div class="header">
  <h1>📚 読み聞かせ記録</h1>
  <p id="header-status">設定からAPIのURLを登録してください</p>
</div>

<!-- 記録 -->
<div id="sec-record" class="section active">
  <div class="card">
    <div class="row4">
      <div class="fg" style="margin:0">
        <label>学年</label>
        <select id="rec-grade" onchange="checkDup()">
          <option value="">選択</option>
          <option>1年生</option><option>2年生</option><option>3年生</option>
          <option>4年生</option><option>5年生</option><option>6年生</option>
        </select>
      </div>
      <div class="fg" style="margin:0">
        <label>学級</label>
        <select id="rec-klasse" onchange="checkDup()">
          <option value="">選択</option>
          <option>1学級</option><option>2学級</option><option>3学級</option>
        </select>
      </div>
      <div class="fg" style="margin:0">
        <label>年度</label>
        <select id="rec-year">
          <option value="">選択</option>
        </select>
      </div>
      <div class="fg" style="margin:0">
        <label>日付</label>
        <input type="text" id="rec-date" placeholder="6/21">
      </div>
    </div>
    <div class="fg">
      <label>本のタイトル</label>
      <input type="text" id="rec-title" placeholder="タイトルを入力..." oninput="checkDup()">
    </div>
    <div id="dup-alert" class="hidden"></div>
    <div class="fg">
      <label>表紙写真（任意）</label>
      <div class="photo-area" id="photo-area">
        <svg viewBox="0 0 24 24" width="30" height="30" stroke="currentColor" fill="none" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        <span>タップして撮影・選択</span>
        <input type="file" accept="image/*" capture="environment" onchange="previewPhoto(this)">
      </div>
    </div>
    <div id="rec-feedback" class="hidden"></div>
    <button class="btn btn-primary" onclick="saveRecord()" id="save-btn">記録する</button>
  </div>
</div>

<!-- 一覧 -->
<div id="sec-list" class="section">
  <div class="filter-row">
    <select id="fl-grade" onchange="renderList()">
      <option value="">全学年</option>
      <option>1年生</option><option>2年生</option><option>3年生</option>
      <option>4年生</option><option>5年生</option><option>6年生</option>
    </select>
    <select id="fl-klasse" onchange="renderList()">
      <option value="">全学級</option>
      <option>1学級</option><option>2学級</option><option>3学級</option>
    </select>
    <select id="fl-year" onchange="renderList()">
      <option value="">全年度</option>
    </select>
  </div>
  <div style="margin-bottom:12px">
    <select id="fl-title" onchange="renderList()">
      <option value="">本のタイトルで絞り込む</option>
    </select>
  </div>
  <div class="stats-row">
    <div class="stat"><div class="stat-n" id="st-total">-</div><div class="stat-l">冊</div></div>
    <div class="stat"><div class="stat-n" id="st-titles">-</div><div class="stat-l">タイトル</div></div>
    <div class="stat"><div class="stat-n" id="st-grades">-</div><div class="stat-l">学年数</div></div>
  </div>
  <div id="book-list"></div>
</div>

<!-- 重複チェック -->
<div id="sec-check" class="section">
  <div class="card">
    <div class="alert info" style="margin-bottom:12px">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span>入学年度を選ぶとその学年が読んだ本を確認できます。最新年度はクラスごとに確認できます。</span>
    </div>
    <div class="row2">
      <div class="fg">
        <label>現在の学年</label>
        <select id="chk-grade">
          <option value="">選択</option>
          <option>1年生</option><option>2年生</option><option>3年生</option>
          <option>4年生</option><option>5年生</option><option>6年生</option>
        </select>
      </div>
      <div class="fg">
        <label>入学年度（1年生の時）</label>
        <select id="chk-entry">
          <option value="">選択</option>
        </select>
      </div>
    </div>
    <button class="btn btn-primary" onclick="runCheck()">チェックする</button>
  </div>
  <div id="chk-result"></div>
</div>

<!-- 検索 -->
<div id="sec-search" class="section">
  <div style="position:sticky;top:57px;background:var(--c-bg);padding-bottom:10px;z-index:40">
    <div style="position:relative">
      <input type="text" id="search-input" placeholder="タイトルを入力して検索..." oninput="runSearch()" style="padding-left:40px;width:100%">
      <svg viewBox="0 0 24 24" width="18" height="18" stroke="var(--c-muted)" fill="none" stroke-width="2" style="position:absolute;left:12px;top:50%;transform:translateY(-50%)"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </div>
  </div>
  <div id="search-result"></div>
</div>

<!-- 設定 -->
<div id="sec-settings" class="section">
  <div class="setup-step">
    <h3><span class="step-num">1</span>ウェブアプリURLを設定</h3>
    <p style="font-size:13px;color:var(--c-muted);margin-bottom:10px;line-height:1.6">Apps ScriptをデプロイしたあとのURLを貼り付けてください</p>
    <div class="fg">
      <label>ウェブアプリURL</label>
      <input type="text" id="api-url" placeholder="https://script.google.com/macros/s/...">
    </div>
    <button class="btn btn-primary" onclick="saveSettings()">保存して接続テスト</button>
  </div>
  <div id="connection-status"></div>
  <div class="setup-step">
    <h3><span class="step-num">2</span>スプレッドシートについて</h3>
    <p style="font-size:13px;color:var(--c-muted);line-height:1.6">接続すると自動でGoogleドライブに「読み聞かせ記録」スプレッドシートが作成されます。</p>
  </div>
  <div class="setup-step">
    <h3><span class="step-num">3</span>ホーム画面に追加（推奨）</h3>
    <p style="font-size:13px;color:var(--c-muted);line-height:1.6">iPhone：Safariで開いて「共有」→「ホーム画面に追加」<br>Android：Chromeで「メニュー」→「ホーム画面に追加」</p>
  </div>
</div>

<!-- ナビ -->
<nav class="nav">
  <button class="nav-btn active" onclick="showTab('record',this)">
    <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    記録
  </button>
  <button class="nav-btn" onclick="showTab('list',this)">
    <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    一覧
  </button>
  <button class="nav-btn" onclick="showTab('check',this)">
    <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    チェック
  </button>
  <button class="nav-btn" onclick="showTab('search',this)">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    検索
  </button>
  <button class="nav-btn" onclick="showTab('settings',this)">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    設定
  </button>
</nav>

<script>
let GAS_URL = localStorage.getItem('gas_url') || 'https://script.google.com/macros/s/AKfycbyP3MIFBUYEP_b1dca_tLsqC';
let allRecords = [];
let photoDataUrl = null;

// 年度リスト
const nowY = new Date().getFullYear();
const YEARS = [];
for (let y = nowY + 1; y >= 2018; y--) YEARS.push(y + '年度');

function fillYears() {
  ['rec-year','fl-year','chk-entry'].forEach(id => {
    const el = document.getElementById(id);
    const first = el.options[0];
    el.innerHTML = '';
    el.appendChild(first.cloneNode(true));
    YEARS.forEach(y => { const o = document.createElement('option'); o.value = o.textContent = y; el.appendChild(o); });
  });
}
fillYears();

if (GAS_URL) {
  document.getElementById('api-url').value = GAS_URL;
  document.getElementById('header-status').textContent = '接続済み';
}

// API
async function apiGet(p) {
  const r = await fetch(GAS_URL + '?' + new URLSearchParams(p));
  return r.json();
}
async function apiPost(b) {
  const r = await fetch(GAS_URL, { method:'POST', body: JSON.stringify(b) });
  return r.json();
}

async function loadRecords() {
  if (!GAS_URL) return;
  try {
    const data = await apiGet({ action: 'getAll' });
    allRecords = (data.records || []).map(r => ({
      id:     r['ID'],
      grade:  r['学年'],
      klasse: r['学級'] || '',
      year:   r['年度'],
      date:   r['日付'],
      title:  r['タイトル'],
      photo:  r['写真URL']
    }));
    refreshTitleSelect();
    renderList();
    updateStatus();
  } catch(e) { console.error(e); }
}

function updateStatus() {
  const el = document.getElementById('header-status');
  el.textContent = GAS_URL ? `接続済み・${allRecords.length}冊記録済み` : '設定からAPIのURLを登録してください';
}

// 写真
function previewPhoto(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 400; let w = img.width, h = img.height;
      if (w > h) { if (w > MAX) { h = h*MAX/w; w = MAX; } }
      else { if (h > MAX) { w = w*MAX/h; h = MAX; } }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      photoDataUrl = canvas.toDataURL('image/jpeg', 0.7);
      document.getElementById('photo-area').innerHTML =
        `<img src="${photoDataUrl}" alt="表紙"><div class="photo-overlay"><span>タップして変更</span></div><input type="file" accept="image/*" capture="environment" onchange="previewPhoto(this)">`;
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// 重複チェック（記録時）
function checkDup() {
  const grade  = document.getElementById('rec-grade').value;
  const klasse = document.getElementById('rec-klasse').value;
  const year   = document.getElementById('rec-year').value;
  const title  = document.getElementById('rec-title').value.trim();
  const el = document.getElementById('dup-alert');
  if (!grade || !title) { el.className = 'hidden'; return; }

  const gradeNum = parseInt(grade);

  // ルール1: 過去年度（学年をまたぐ子ども視点）の重複
  const pastDups = allRecords.filter(r => {
    if (r.title !== title) return false;
    if (parseInt(r.grade) < gradeNum) return true; // 過去の学年で読んだ
    return false;
  });

  // ルール2: 同年度・同学年で他クラスは OK、チェック不要
  // ルール3: 同年度・同学年・同クラスは重複NG
  const sameClassDup = year && klasse && allRecords.find(
    r => r.title === title && r.year === year && r.grade === grade && r.klasse === klasse
  );

  if (sameClassDup) {
    el.className = 'alert warn';
    el.innerHTML = `<svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span>⚠ 同じクラスですでに読んでいます（${year} ${grade} ${klasse}）</span>`;
  } else if (pastDups.length > 0) {
    const info = [...new Set(pastDups.map(r => `${r.year} ${r.grade}`))].join('、');
    el.className = 'alert warn';
    el.innerHTML = `<svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span>⚠ この本は過去に読まれています（${info}）</span>`;
  } else if (title.length > 0) {
    el.className = 'alert ok';
    el.innerHTML = `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg><span>この本はまだ読んでいません ✓</span>`;
  } else {
    el.className = 'hidden';
  }
}

// 記録保存
async function saveRecord() {
  const grade  = document.getElementById('rec-grade').value;
  const klasse = document.getElementById('rec-klasse').value;
  const year   = document.getElementById('rec-year').value;
  const date   = document.getElementById('rec-date').value.trim();
  const title  = document.getElementById('rec-title').value.trim();
  const fb = document.getElementById('rec-feedback');
  if (!grade || !klasse || !year || !title) {
    fb.className = 'alert warn';
    fb.innerHTML = '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span>学年・学級・年度・タイトルを入力してください</span>';
    return;
  }
  if (!GAS_URL) { fb.className='alert warn'; fb.innerHTML='<span>設定タブでURLを設定してください</span>'; return; }
  const btn = document.getElementById('save-btn');
  btn.textContent = '保存中...'; btn.disabled = true;
  try {
    const result = await apiPost({ action:'add', data:{ grade, klasse, year, date, title, photo: photoDataUrl||'' } });
    if (result.success) {
      allRecords.unshift({ id:result.id, grade, klasse, year, date, title, photo: photoDataUrl||'' });
      refreshTitleSelect();
      fb.className = 'alert ok';
      fb.innerHTML = `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg><span>「${title}」を記録しました（${grade} ${klasse}）</span>`;
      document.getElementById('rec-title').value = '';
      document.getElementById('rec-date').value = '';
      document.getElementById('dup-alert').className = 'hidden';
      photoDataUrl = null;
      document.getElementById('photo-area').innerHTML = `<svg viewBox="0 0 24 24" width="30" height="30" stroke="currentColor" fill="none" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg><span>タップして撮影・選択</span><input type="file" accept="image/*" capture="environment" onchange="previewPhoto(this)">`;
      updateStatus();
      setTimeout(()=>{ fb.className='hidden'; }, 3000);
    } else { fb.className='alert warn'; fb.innerHTML=`<span>エラー: ${result.error}</span>`; }
  } catch(e) { fb.className='alert warn'; fb.innerHTML='<span>通信エラーが発生しました</span>'; }
  btn.textContent = '記録する'; btn.disabled = false;
}

// タイトル一覧をあいうえお順で更新
function refreshTitleSelect() {
  const el = document.getElementById('fl-title');
  const current = el.value;
  const titles = [...new Set(allRecords.map(r => r.title))]
    .sort((a, b) => a.localeCompare(b, 'ja'));
  el.innerHTML = '<option value="">本のタイトルで絞り込む</option>';
  titles.forEach(t => {
    const o = document.createElement('option');
    o.value = o.textContent = t;
    el.appendChild(o);
  });
  if (current) el.value = current;
}

// 一覧
function renderList() {
  const fg = document.getElementById('fl-grade').value;
  const fk = document.getElementById('fl-klasse').value;
  const fy = document.getElementById('fl-year').value;
  const ft = document.getElementById('fl-title').value;
  let data = [...allRecords];
  if (fg) data = data.filter(r => r.grade === fg);
  if (fk) data = data.filter(r => r.klasse === fk);
  if (fy) data = data.filter(r => r.year === fy);
  if (ft) data = data.filter(r => r.title === ft);
  document.getElementById('st-total').textContent  = data.length;
  document.getElementById('st-titles').textContent = new Set(data.map(r=>r.title)).size;
  document.getElementById('st-grades').textContent = new Set(data.map(r=>r.grade)).size;
  const bl = document.getElementById('book-list');
  if (data.length === 0) { bl.innerHTML='<div class="empty">📭 記録がありません</div>'; return; }
  bl.innerHTML = data.map(r => `
    <div class="book-item">
      <div class="book-thumb">${r.photo ? `<img src="${r.photo}" alt="表紙">` : '📖'}</div>
      <div class="book-info">
        <div class="book-title">${r.title}</div>
        <div class="book-meta">
          ${r.year}
          <span class="badge badge-grade">${r.grade}</span>
          ${r.klasse ? `<span class="badge badge-klasse">${r.klasse}</span>` : ''}
          ${r.date ? '· '+r.date : ''}
        </div>
      </div>
      <button class="del-btn" onclick="deleteRecord('${r.id}','${r.title}')" aria-label="削除">
        <svg viewBox="0 0 24 24" width="19" height="19" stroke="currentColor" fill="none" stroke-width="1.8"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
      </button>
    </div>`).join('');
}

async function deleteRecord(id, title) {
  if (!confirm(`「${title}」を削除しますか？`)) return;
  try {
    const r = await apiPost({ action:'delete', id });
    if (r.success) { allRecords = allRecords.filter(r=>r.id!=id); refreshTitleSelect(); renderList(); updateStatus(); }
  } catch(e) { alert('削除に失敗しました'); }
}

// 重複チェック画面
function runCheck() {
  const grade  = document.getElementById('chk-grade').value;
  const entry  = document.getElementById('chk-entry').value;
  const res    = document.getElementById('chk-result');
  if (!grade || !entry) {
    res.innerHTML = '<div class="card" style="color:var(--c-muted);font-size:13px;text-align:center">学年と入学年度を選択してください</div>';
    return;
  }
  const entryNum = parseInt(entry);
  const gradeNum = parseInt(grade);

  // 最新年度を特定
  const latestYear = (entryNum + gradeNum - 1) + '年度';

  // 各学年の記録を収集
  const sections = [];
  for (let g = 1; g <= gradeNum; g++) {
    const targetYear  = (entryNum + g - 1) + '年度';
    const gradeLabel  = g + '年生';
    const isLatest    = (g === gradeNum);
    const books       = allRecords.filter(r => r.year === targetYear && r.grade === gradeLabel);
    if (books.length > 0 || isLatest) {
      sections.push({ grade: gradeLabel, year: targetYear, books, isLatest });
    }
  }

  if (sections.every(s => s.books.length === 0)) {
    res.innerHTML = '<div class="card"><div class="empty">📭 この子の記録はまだありません</div></div>';
    return;
  }

  const total = sections.reduce((a,s)=>a+s.books.length, 0);

  let html = `<div class="card"><div class="alert info" style="margin-bottom:12px">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span>${entry}入学 → 現在${grade}｜合計${total}冊</span>
  </div>`;

  sections.forEach(s => {
    html += `<div class="chk-section-title">${s.grade}（${s.year}）${s.isLatest ? ' ★最新年度' : ''}</div>`;
    if (s.isLatest && s.books.length > 0) {
      // 最新年度はクラスごとに分けて表示
      const klasses = ['1学級','2学級','3学級'];
      klasses.forEach(kl => {
        const kb = s.books.filter(b => b.klasse === kl);
        if (kb.length === 0) return;
        html += `<div class="klasse-block">
          <div class="klasse-header"><span class="klasse-badge">${kl}</span>${kb.length}冊</div>
          ${kb.map(b => bookItem(b)).join('')}
        </div>`;
      });
      // 学級未設定分
      const noKl = s.books.filter(b => !b.klasse);
      if (noKl.length > 0) {
        html += `<div class="klasse-block"><div class="klasse-header">学級未設定</div>${noKl.map(b => bookItem(b)).join('')}</div>`;
      }
    } else if (s.books.length > 0) {
      // 過去年度は学年まとめ
      html += s.books.map(b => bookItem(b)).join('');
    } else {
      html += `<div style="font-size:13px;color:var(--c-muted);padding:8px 0">記録なし</div>`;
    }
  });

  html += '</div>';
  res.innerHTML = html;
}

function bookItem(b) {
  return `<div class="book-item" style="margin-bottom:6px">
    <div class="book-thumb">${b.photo ? `<img src="${b.photo}" alt="表紙">` : '📖'}</div>
    <div class="book-info">
      <div class="book-title">${b.title}</div>
      <div class="book-meta">${b.klasse ? `<span class="badge badge-klasse">${b.klasse}</span>` : ''}${b.date ? ' '+b.date : ''}</div>
    </div>
  </div>`;
}

// 設定
async function saveSettings() {
  const url = document.getElementById('api-url').value.trim();
  const st  = document.getElementById('connection-status');
  if (!url) { st.innerHTML='<div class="alert warn">URLを入力してください</div>'; return; }
  st.innerHTML = '<div class="alert info"><span>接続テスト中...</span></div>';
  try {
    const r = await fetch(url + '?action=getAll');
    const d = await r.json();
    if (d.records !== undefined) {
      GAS_URL = url; localStorage.setItem('gas_url', url);
      st.innerHTML = `<div class="alert ok"><svg viewBox="0 0 24 24" width="17" height="17" stroke="currentColor" fill="none" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg><span>接続成功！スプレッドシートと連携されました</span></div>`;
      await loadRecords();
    } else { st.innerHTML='<div class="alert warn"><span>接続エラー：URLを確認してください</span></div>'; }
  } catch(e) { st.innerHTML='<div class="alert warn"><span>接続失敗：URLを確認してください</span></div>'; }
}

function runSearch() {
  const q = document.getElementById('search-input').value.trim();
  const res = document.getElementById('search-result');
  if (q.length === 0) {
    res.innerHTML = '<div class="empty">タイトルの一部を入力してください</div>';
    return;
  }
  const matched = allRecords.filter(r => r.title.includes(q));
  if (matched.length === 0) {
    res.innerHTML = `<div class="empty">「${q}」は見つかりませんでした</div>`;
    return;
  }
  // タイトルでグループ化
  const grouped = {};
  matched.forEach(r => {
    if (!grouped[r.title]) grouped[r.title] = [];
    grouped[r.title].push(r);
  });
  let html = `<p style="font-size:12px;color:var(--c-muted);margin-bottom:10px">${matched.length}件見つかりました</p>`;
  Object.entries(grouped).forEach(([title, records]) => {
    const photo = records.find(r => r.photo)?.photo || '';
    html += `<div class="book-item" style="margin-bottom:8px;flex-wrap:wrap">
      <div class="book-thumb">${photo ? `<img src="${photo}" alt="表紙">` : '📖'}</div>
      <div class="book-info">
        <div class="book-title">${title}</div>
        <div style="margin-top:4px;display:flex;flex-wrap:wrap;gap:4px">
          ${records.map(r => `<span style="font-size:11px;background:var(--c-info-bg);color:var(--c-accent);padding:2px 8px;border-radius:20px">${r.year} ${r.grade}${r.klasse ? ' '+r.klasse : ''}</span>`).join('')}
        </div>
      </div>
    </div>`;
  });
  res.innerHTML = html;
}

function showTab(name, btn) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+name).classList.add('active');
  btn.classList.add('active');
  if (name==='list') renderList();
  if (name==='search') {
    document.getElementById('search-input').value = '';
    document.getElementById('search-result').innerHTML = '<div class="empty">タイトルの一部を入力してください</div>';
    setTimeout(() => document.getElementById('search-input').focus(), 100);
  }
}

if (GAS_URL) loadRecords();
</script>
